<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Welcome to my CV</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            /* CENTRADO DEL ESCENARIO */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        #escenario {
            width: 80vw;
            height: 80vh;
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            position: relative;
            overflow: hidden;

            /* AÑADIMOS UN PATRÓN PARA VER EL MOVIMIENTO */
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 5vw 5vw; /* Tamaño de la cuadrícula */
        }

        #sprite {
            width: 4vw; /* Un poco más grande para que se vea bien */
            height: 4vw;
            background-color: #ff3e00;
            border-radius: 20%;
            
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            z-index: 10;
            box-shadow: 0 0 30px rgba(255, 62, 0, 0.6);
        }

        .instrucciones {
            position: absolute;
            top: 20px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="instrucciones">Usa las flechas del teclado para explorar</div>

    <div id="escenario">
        <div id="sprite"></div>
    </div>

    <script>
        const escenario = document.getElementById('escenario');
        
        let bgX = 0;
        let bgY = 0;
        const velocidad = 10; 
        const teclas = {};

        // Escuchamos el teclado en la ventana global
        window.addEventListener('keydown', (e) => {
            teclas[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            teclas[e.key] = false;
        });

        function bucle() {
            // Movimiento del fondo
            if (teclas['ArrowUp'])    bgY += velocidad;
            if (teclas['ArrowDown'])  bgY -= velocidad;
            if (teclas['ArrowLeft'])  bgX += velocidad;
            if (teclas['ArrowRight']) bgX -= velocidad;

            // Actualizamos la posición del fondo para que se vea el patrón moverse
            escenario.style.backgroundPosition = `${bgX}px ${bgY}px`;

            requestAnimationFrame(bucle);
        }

        bucle();
    </script>
</body>
</html>
